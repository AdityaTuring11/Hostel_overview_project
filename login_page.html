<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

form {
    display: inline-block;
    padding: 20px;
    border: 1px solid gray;
}

input {
    padding: 8px;
    margin: 8px;
    width: 200px;
}

button {
    padding: 8px 15px;
    margin-top: 10px;
}

#captchaBox {
    font-weight: bold;
    margin: 10px;
}
</style>

</head>

<body>

<h2>Login</h2>

<form onsubmit="return validateCaptcha()">

    <input type="text" placeholder="Username" required><br>
    <input type="password" placeholder="Password" required><br>

    <!-- CAPTCHA -->
    <div id="captchaBox"></div>

    <button type="button" onclick="generateCaptcha()">Refresh</button><br>

    <input type="text" id="userAnswer" placeholder="Your Answer" required><br>

    <button type="submit">Login</button>

</form>

<p>Don't have an account? <a href="register.html">Register</a></p>
<p>Forgot Password? <a href="#">Reset Password</a></p>

<script>
let num1, num2, correctAnswer;

function generateCaptcha() {
    num1 = Math.floor(Math.random() * 10);
    num2 = Math.floor(Math.random() * 10);
    correctAnswer = num1 * num2;

    document.getElementById("captchaBox").innerText =
        num1 + " x " + num2 + " = ?";
}

// validate
function validateCaptcha() {
    let userAns = document.getElementById("userAnswer").value;

    if (userAns == correctAnswer) {
        alert("Login Successful ✅");
        return true;
    } else {
        alert("Wrong CAPTCHA ❌ Try again");
        generateCaptcha();
        return false;
    }
}

// generate on load
generateCaptcha();
</script>

</body>
</html>
